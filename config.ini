[source]
host = imap.example.com
port = 993
username = user@example.com
# Use systemd credentials instead of plain text if deployed via Makefile:
# sudo nano /etc/imaporter/source.secret
# password = your_password
ssl = true

[destination]
host = imap.gmail.com
port = 993
username = your_gmail@gmail.com
# sudo nano /etc/imaporter/destination.secret
# password = your_app_password
ssl = true
ham_folder = INBOX
ham_label = MySourceAccount

[spamassassin]
# Set to false to bypass spam checking entirely
enabled = true
# Max message size in bytes to send to spamassassin (default 5MB)
max_size = 5242880
