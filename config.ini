[source_default]
host = imap.example.com
port = 993
username = user@example.com
password = your_password
ssl = true
# Optional: Set to false to leave emails safely on the source server
delete_on_source = true
# Optional label to apply to ham emails imported exclusively from this source
ham_label = MySourceAccount

# You can add as many sources as you want by duplicating the block with a new suffix!
# [source_work]
# host = imap.work.com
# port = 993
# username = you@work.com
# ssl = true

[destination]
host = imap.gmail.com
port = 993
username = your_gmail@gmail.com
password = your_app_password
ssl = true
ham_folder = INBOX
spam_folder = [Gmail]/Spam

[spamassassin]
# Set to false to bypass spam checking entirely
enabled = true
# Max message size in bytes to send to spamassassin (default 5MB)
max_size = 5242880
