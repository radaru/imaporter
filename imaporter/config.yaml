# https://developers.home-assistant.io/docs/apps/configuration#app-configuration
name: IMAPorter
version: "1.2.0"
slug: imaporter
description: >-
  Fetch emails from an external IMAP account via IDLE push notifications,
  filter through SpamAssassin, and deliver to Gmail via IMAP APPEND.
url: https://github.com/radaru/imaporter
arch:
  - aarch64
  - amd64
map:
  - homeassistant_config:ro
init: false
startup: services
boot: auto
homeassistant: "2023.11.0"
stage: experimental
options:
  sources:
    - host: "imap.example.com"
      port: 993
      username: ""
      password: ""
      ssl: true
      folder: "INBOX"
      delete: true
      ham_label: ""
  destination_host: "imap.gmail.com"
  destination_port: 993
  destination_username: ""
  destination_password: ""
  destination_ssl: true
  destination_ham_folder: "INBOX"
  destination_spam_folder: "[Gmail]/Spam"
  spamassassin_enabled: true
  spamassassin_required_score: 5.0
  spamassassin_max_size: 5242880
  log_level: "info"
schema:
  sources:
    - host: str
      port: port
      username: str
      password: password
      ssl: bool
      folder: str
      delete: bool
      ham_label: "str?"
  destination_host: str
  destination_port: port
  destination_username: str
  destination_password: password
  destination_ssl: bool
  destination_ham_folder: str
  destination_spam_folder: str
  spamassassin_enabled: bool
  spamassassin_required_score: "float(1,)"
  spamassassin_max_size: "int(0,)"
  log_level: "list(debug|info|warning|error)"
